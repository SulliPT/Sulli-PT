function diagOf(name) {
  const n = name.toLowerCase();
  if (n.includes('e-stim') || n.includes('warm')) return SVG.estim;
  if (n.includes('hip extension') || n.includes('hip flexor') || n.includes('thomas') || n.includes('passive stretch')) return SVG.hipext;
  if (n.includes('mirror') || n.includes('visual anchor') || n.includes('chin') || n.includes('no blocks')) return SVG.sitmirror;
  if (n.includes('reach')) return SVG.armreach;
  if (n.includes('sit-to-stand') || n.includes('drive initiation') || n.includes('initiation wait') || n.includes('slow rise') || n.includes('best quality') || n.includes('8-count')) return SVG.sitstand;
  if (n.includes('standing hold') || n.includes('max hold') || n.includes('staggered') || n.includes('eyes closed') || n.includes('ceiling push') || n.includes('sustained quality')) return SVG.standhold;
  if (n.includes('stand-to-sit') || n.includes('eccentric') || n.includes('descent') || n.includes('no mirror')) return SVG.standsit;
  if (n.includes('weight shift') || n.includes('unpredictable target') || n.includes('visual track')) return SVG.weightshift;
  if (n.includes('quadruped') || n.includes('head lift')) return SVG.quadruped;
  if (n.includes('perturbation')) return SVG.perturbation;
  if (n.includes('stretch') || n.includes('cool-down') || n.includes('passive')) return SVG.stretch;
  if (n.includes('full sequence') || n.includes('benchmark') || n.includes('weekly log')) return SVG.fullchain;
  if (n.includes('transition')) return SVG.sitstand;
  if (n.includes('stand') && n.includes('hold')) return SVG.standhold;
  return SVG.sitstand;
}

      {n:'Cool-Down — Passive Stretching',dur:'5 min',hold:'45 sec per stretch',eq:'Mat, wedge',f:'all3',c:'Hip flexors (Thomas position), calves (wedge under heel). Sustained, no bouncing. If tone has spiked, extend cool-down to 8 min.',d:'End-of-week tone management. High-tone kids accumulate spasticity across a session and across a week. Non-negotiable.',pw:'No progression trigger — stays every week.'},
    ]
  },
  { key:'sat', label:'Saturday', type:'benchmark', focus:'Benchmark & Weekly Log',
    all3:[
      {n:'E-Stim Warm-Up Extended',dur:'15–20 min',eq:'E-stim unit',f:'all3',c:'Extended session. Observe tone at 10 min — if still high, extend stim and note it. Log tone level at start. Saturday tone is your weekly clinical data point.',d:'Saturday is benchmark day. Tone at start affects all hold data — log it consistently.',pw:'When Saturday tone consistently modulates within 12 min for 3+ weeks, reduce warm-up to 12 min fixed.'},
      {n:'Hip Flexor Passive Stretch Both Sides',sets:'3',hold:'45 sec per side',eq:'Mat',f:'all3',c:'Thomas test position both sides. Both parents present — use this for proper positioning. If spasm triggers, hold position. Log: spasm on either side (Y/N).',d:'Saturday stretch is the clinical reference for hip flexor tightness. Track whether spasm is reducing, stable, or increasing week over week.',pw:'If spasm during Thomas stretch is increasing week over week, flag for DMI therapist before continuing standing progression.'},
      {n:'Sitting — Benchmark Hold No Blocks No Touch',sets:'3',hold:'Best effort — log exact time',eq:'Mat, mirror',f:'all3',c:'No blocks, no touch, mirror at eye level. Spot from behind only. Log exact hold time each set. Week 1 times are your baseline — record every Saturday.',d:'Goal 1 benchmark: independent sitting with trunk control. The trend over weeks matters more than any single number.',pw:'When Saturday sitting holds reach 45+ sec consistently for 3 Saturdays, come back — sitting work ready to progress.'},
      {n:'Full Sequence — Benchmark',sets:'3',reps:'Full sit to stand to hold to sit',hold:'Best effort — log hold time',eq:'Standing bars, mat, mirror',f:'all3',c:'Full chain: slow 5-count rise, hold (log time), slow 5-count descent. Parent 1 at ASIS entire sequence. Log for each set: initiated (Y/N), hold time, controlled descent (Y/N), where sequence broke down.',d:'Saturday full-chain benchmark. Compare to Friday\'s sequence.',pw:'When all 3 Saturday sets show initiated independently + hold 25+ sec + controlled descent for 2 consecutive Saturdays, come back.'},
      {n:'Standing — Max Hold Benchmark',sets:'2',hold:'Best effort — log exact time',eq:'Standing bars, mirror',f:'all3',c:'Anterior tilt facilitation + mirror. No other cues. Record time to form break. Log which failure mode: hips buckle, trunk loses midline, or head drops.',d:'Goal 2 benchmark: standing endurance. The failure mode tells you which system is the limiting factor.',pw:'When Saturday max hold reaches 45+ sec for both sets for 2 consecutive Saturdays, come back — standing hold duration ready to progress.'},
      {n:'Cool-Down and Weekly Log',dur:'10 min',hold:'45 sec per stretch',eq:'Mat, wedge',f:'all3',c:'Passive stretching: hip flexors, calves. Then log three things before closing: (1) sitting benchmark times, (2) standing benchmark time and failure mode, (3) one thing better than last Saturday and one thing that was not.',d:'Saturday log is your clinical continuity. When you come back to update an exercise, the Saturday notes are what you will reference.',pw:'No progression trigger — stays every week.'},
    ]
  },
];

// ── CHIP ─────────────────────────────────────────────────────
function Chip({label,val}) {
  return h('div',{style:{background:'#fff',border:'1px solid #E5E7EB',borderRadius:6,padding:'4px 8px'}},
    h('span',{style:{fontSize:10,color:'#6B7280',textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:700}},label+': '),
    h('span',{style:{fontSize:12,color:'#1A1A2E',fontWeight:500}},val)
  );
}

// ── DIAGRAM BOX ───────────────────────────────────────────────
function DiagBox({label,svgStr}) {
  return h('div',{style:{background:'#F7F8FA',borderRadius:8,padding:8,textAlign:'center'}},
    h('div',{style:{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'#6B7280',marginBottom:4}},label),
    h('div',{dangerouslySetInnerHTML:{__html:svgStr}})
  );
}

// ── EXERCISE CARD ─────────────────────────────────────────────
function ExCard({ex, noteKey, savedNote, onSave}) {
  const [open,setOpen] = useState(false);
  const [pwOpen,setPwOpen] = useState(false);
  const [note,setNote] = useState(savedNote||'');
  const [saved,setSaved] = useState(false);
  const isSolo = ex.f==='solo';
  const diag = diagOf(ex.n);
  const quick = ex.dur||ex.hold||ex.reps||'';
  const isChallenge = ex.n.includes('CEILING')||ex.n.includes('CHALLENGE');

  const handleNote = useCallback((val)=>{
    setNote(val);
    onSave(noteKey,val);
    setSaved(true);
    setTimeout(()=>setSaved(false),1500);
  },[noteKey,onSave]);

  return h('div',{style:{background:isSolo?'#FDFAF5':'#F5F9FD',border:`1.5px solid ${isChallenge?'#C07A3A':isSolo?'#E8D5B7':'#C8D8E8'}`,borderRadius:12,marginBottom:8,overflow:'hidden'}},
    // Header
    h('div',{onClick:()=>setOpen(o=>!o),style:{display:'flex',alignItems:'center',gap:10,padding:14,minHeight:56,cursor:'pointer'}},
      h('span',{style:{fontSize:10,fontWeight:800,letterSpacing:'0.08em',textTransform:'uppercase',padding:'3px 8px',borderRadius:5,color:'#fff',flexShrink:0,background:isSolo?'#C07A3A':'#1D4E7A'}},isSolo?'Jenna':'All 3'),
      h('span',{style:{fontSize:14,fontWeight:700,color:'#1A1A2E',flex:1,lineHeight:1.3}},ex.n),
      quick&&h('span',{style:{fontSize:12,color:'#6B7280',flexShrink:0,marginLeft:4}},quick),
      h('span',{style:{color:'#9CA3AF',fontSize:14,transition:'transform 0.2s',transform:open?'rotate(180deg)':'none'}},'▾')
    ),
    // Body
    open&&h('div',{style:{borderTop:'1px solid #E5E7EB'}},
      // Diagrams
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'12px 12px 0'}},
        diag&&diag.pos&&h(DiagBox,{label:'Position',svgStr:diag.pos}),
        diag&&diag.cue&&h(DiagBox,{label:'Hand Cue',svgStr:diag.cue})
      ),
      // Chips
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,padding:'10px 12px 0'}},
        ex.sets&&h(Chip,{label:'Sets',val:ex.sets}),
        ex.reps&&h(Chip,{label:'Reps',val:ex.reps}),
        ex.hold&&h(Chip,{label:'Hold',val:ex.hold}),
        ex.dur&&h(Chip,{label:'Duration',val:ex.dur}),
        ex.eq&&h(Chip,{label:'Equipment',val:ex.eq})
      ),
      // Cue
      h('div',{style:{padding:'10px 12px 0'}},
        h('div',{style:{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.08em',color:'#6B7280',marginBottom:4}},'Cue'),
        h('div',{style:{fontSize:13,lineHeight:1.6,color:'#333'}},ex.c)
      ),
      // DMI
      h('div',{style:{margin:'10px 12px 0',background:'#EFF6FF',borderLeft:'3px solid #1D4E7A',borderRadius:'0 8px 8px 0',padding:'8px 10px'}},
        h('div',{style:{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.08em',color:'#1D4E7A',marginBottom:3}},'DMI Rationale'),
        h('div',{style:{fontSize:12,lineHeight:1.5,color:'#1e3a5f'}},ex.d)
      ),
      // Progress When
      h('div',{style:{margin:'10px 12px 0'}},
        h('div',{onClick:(e)=>{e.stopPropagation();setPwOpen(o=>!o)},style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#EDE9FE',border:'1.5px solid #7C3AED',borderRadius:pwOpen?'8px 8px 0 0':8,padding:'8px 10px',cursor:'pointer'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            h('span',{style:{fontSize:14}},'🔔'),
            h('span',{style:{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.07em',color:'#7C3AED'}},'Progress When')
          ),
          h('span',{style:{color:'#7C3AED',fontSize:13,transition:'transform 0.2s',transform:pwOpen?'rotate(180deg)':'none'}},'▾')
        ),
        pwOpen&&h('div',{style:{background:'#EDE9FE',border:'1.5px solid #7C3AED',borderTop:'none',borderRadius:'0 0 8px 8px',padding:'8px 10px'}},
          h('div',{style:{fontSize:12,lineHeight:1.6,color:'#4C1D95'}},ex.pw)
        )
      ),
      // Note
      h('div',{style:{padding:'10px 12px 12px'}},
        h('div',{style:{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.08em',color:'#6B7280',marginBottom:4}},'Session Note'),
        h('textarea',{value:note,onChange:e=>handleNote(e.target.value),placeholder:'Log hold time, cue level, observations...',style:{width:'100%',minHeight:68,border:'1.5px solid #E5E7EB',borderRadius:8,padding:'8px 10px',fontSize:13,resize:'vertical',background:'#fff',color:'#1A1A2E',boxSizing:'border-box'}}),
        saved&&h('div',{style:{fontSize:11,color:'#2D6A4F',marginTop:3}},'Saved ✓')
      )
    )
  );
}

// ── BLOCK ─────────────────────────────────────────────────────
function Block({title,sub,exes,color,dayKey,blockKey,notes,onSave}) {
  return h('div',{style:{padding:'10px 16px 0'}},
    h('div',{style:{background:color,padding:'8px 12px',borderRadius:10,marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('span',{style:{fontWeight:700,fontSize:14,color:'#fff'}},title),
      h('span',{style:{fontSize:11,color:'rgba(255,255,255,0.85)'}},sub)
    ),
    ...exes.map((ex,i)=>{
      const key = `${dayKey}_${blockKey}_${ex.n.replace(/\s+/g,'_').substring(0,25)}`;
      return h(ExCard,{key:i,ex,noteKey:key,savedNote:notes[key]||'',onSave});
    })
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
const DAY_COLORS = {consolidation:'#2D6A4F',challenge:'#C07A3A',benchmark:'#6B2D6B'};
const DAY_BADGES = {
  consolidation:{bg:'#D8F3DC',color:'#2D6A4F',icon:'✓',text:'Consolidation — reinforce pattern at baseline'},
  challenge:{bg:'#FDF0E4',color:'#C07A3A',icon:'⚡',text:'Challenge — hold duration ceiling push'},
  benchmark:{bg:'#F0D8F0',color:'#6B2D6B',icon:'📊',text:'Benchmark — log data, compare to prior weeks'},
};

function App() {
  const rawDay = new Date().getDay();
  const todayIdx = rawDay===0?5:Math.min(rawDay-1,5);
  const [dayIdx,setDayIdx] = useState(todayIdx);
  const [screen,setScreen] = useState('session');
  const [notes,setNotes] = useState({});

  useEffect(()=>{
    try {
      const raw = localStorage.getItem('dmi_notes_v3');
      if(raw) setNotes(JSON.parse(raw));
    } catch(e){}
  },[]);

  const saveNote = useCallback((key,val)=>{
    setNotes(prev=>{
      const next={...prev,[key]:val};
      try{localStorage.setItem('dmi_notes_v3',JSON.stringify(next));}catch(e){}
      return next;
    });
  },[]);

  const day = DAYS[dayIdx];
  const typeColor = DAY_COLORS[day.type];
  const badge = DAY_BADGES[day.type];
  const isSat = day.type==='benchmark';
  const noteEntries = Object.entries(notes).filter(([,v])=>v.trim());

  return h('div',{style:{background:'#F7F8FA',minHeight:'100vh',paddingBottom:72}},
    // STICKY HEADER
    h('div',{style:{position:'sticky',top:0,zIndex:10,background:'#fff',borderBottom:'1px solid #E5E7EB',padding:'14px 16px 10px'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
        h('div',null,
          h('div',{style:{fontSize:17,fontWeight:800,color:'#1A1A2E'}},'Sullivan DMI'),
          h('div',{style:{fontSize:11,color:'#6B7280'}},'Weekly Routine — Phase 1')
        ),
        h('span',{style:{fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,background:badge.bg,color:badge.color}},day.focus)
      ),
      h('div',{className:'scroll-x'},
        ...DAYS.map((d,i)=>h('button',{
          key:d.key,onClick:()=>setDayIdx(i),
          style:{flex:'0 0 auto',width:46,height:36,borderRadius:10,fontSize:11,fontWeight:700,cursor:'pointer',
            border:`2px solid ${dayIdx===i?DAY_COLORS[d.type]:'#E5E7EB'}`,
            background:dayIdx===i?DAY_COLORS[d.type]:'#fff',
            color:dayIdx===i?'#fff':'#6B7280',transition:'all 0.15s'}
        },d.label.substring(0,3)))
      )
    ),

    // SESSION SCREEN
    screen==='session'&&h(Fragment,null,
      h('div',{style:{margin:'10px 16px 0',padding:'7px 12px',borderRadius:8,background:badge.bg,border:`1px solid ${badge.color}`,fontSize:11,color:badge.color,fontWeight:700}},
        badge.icon+' '+badge.text
      ),
      h('div',{style:{margin:'8px 16px 0',background:'#FEF3C7',border:'1.5px solid #F59E0B',borderRadius:10,padding:'10px 12px',fontSize:12,lineHeight:1.5,color:'#78350F'}},
        h('strong',null,'⚠ Safety: '),'No catch reflex — spotter required on all standing. Flag fatigue before form breaks. E-stim first; read tone before proceeding.'
      ),
      isSat
        ? h(Block,{title:'Saturday Session',sub:'60 min · All three + benchmarks',exes:day.all3,color:typeColor,dayKey:day.key,blockKey:'all3',notes,onSave:saveNote})
        : h(Fragment,null,
            h(Block,{title:'Jenna Solo Block',sub:'30 min',exes:day.solo,color:'#C07A3A',dayKey:day.key,blockKey:'solo',notes,onSave:saveNote}),
            h(Block,{title:'All Three Block',sub:'30 min',exes:day.all3,color:typeColor,dayKey:day.key,blockKey:'all3',notes,onSave:saveNote})
          ),
      h('div',{style:{height:20}})
    ),

    // LOG SCREEN
    screen==='notes'&&h('div',{style:{padding:'16px 16px 0'}},
      h('div',{style:{fontSize:18,fontWeight:800,color:'#1A1A2E',marginBottom:4}},'Session Log'),
      h('div',{style:{fontSize:13,color:'#6B7280',marginBottom:16}},'All saved notes — newest first.'),
      noteEntries.length===0
        ? h('div',{style:{textAlign:'center',padding:'40px 20px',color:'#6B7280',fontSize:14}},'No session notes yet.',h('br'),'Notes saved during sessions appear here.')
        : h(Fragment,null,...[...noteEntries].reverse().map(([key,val])=>{
            const parts=key.split('_');
            const dayLabel=DAYS.find(d=>d.key===parts[0])?.label||parts[0];
            const block=parts[1];
            const nm=parts.slice(2).join(' ').replace(/_/g,' ');
            return h('div',{key,style:{background:'#fff',borderRadius:10,border:'1.5px solid #E5E7EB',marginBottom:8,padding:'12px 14px'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}},
                h('span',{style:{fontSize:13,fontWeight:700,color:'#1A1A2E'}},nm),
                h('span',{style:{fontSize:11,color:'#6B7280'}},dayLabel+' · '+block)
              ),
              h('div',{style:{fontSize:13,color:'#444',lineHeight:1.5}},val)
            );
          })),
      h('div',{style:{height:20}})
    ),

    // BOTTOM NAV
    h('div',{style:{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #E5E7EB',display:'flex',zIndex:100}},
      ...['session','notes'].map(id=>h('button',{
        key:id,onClick:()=>setScreen(id),
        style:{flex:1,padding:'10px 8px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:3,
          color:screen===id?'#1D4E7A':'#9CA3AF',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}
      },
        h('span',{style:{fontSize:20,lineHeight:1}},id==='session'?'📋':'📝'),
        id==='session'?'Routine':'Log'
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
