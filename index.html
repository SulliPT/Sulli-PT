function diagOf(name) {
  const n = name.toLowerCase();
  if (n.includes("e-stim") || n.includes("warm")) return SVGs.estim;
  if (n.includes("hip extension") || n.includes("hip flexor") || n.includes("thomas") || n.includes("passive stretch")) return SVGs.hipext;
  if (n.includes("mirror") || n.includes("visual anchor") || n.includes("chin") || n.includes("no blocks")) return SVGs.sitmirror;
  if (n.includes("arm reach") || n.includes("reach")) return SVGs.armreach;
  if (n.includes("sit-to-stand") || n.includes("drive initiation") || n.includes("initiation wait") || n.includes("slow rise") || n.includes("best quality") || n.includes("8-count")) return SVGs.sitstand;
  if (n.includes("standing hold") || n.includes("max hold") || n.includes("tandem") || n.includes("eyes closed") || n.includes("staggered") || n.includes("sustained quality") || n.includes("ceiling push")) return SVGs.standhold;
  if (n.includes("stand-to-sit") || n.includes("eccentric") || n.includes("descent") || n.includes("no mirror")) return SVGs.standsit;
  if (n.includes("weight shift") || n.includes("unpredictable target") || n.includes("visual track")) return SVGs.weightshift;
  if (n.includes("quadruped") || n.includes("hands-and-knees") || n.includes("head lift")) return SVGs.quadruped;
  if (n.includes("perturbation") || n.includes("manual perturbation")) return SVGs.perturbation;
  if (n.includes("stretch") || n.includes("cool-down") || n.includes("passive")) return SVGs.stretch;
  if (n.includes("full sequence") || n.includes("full chain") || n.includes("weekly log") || n.includes("benchmark")) return SVGs.fullchain;
  if (n.includes("side-sit") || n.includes("long-sit") || n.includes("transition")) return SVGs.sitstand;
  if (n.includes("stand") && n.includes("hold")) return SVGs.standhold;
  return SVGs.sitstand;
}

  }, [noteKey, onSave]);

  return (
    <div style={{ background: isSolo ? "#FDFAF5" : "#F5F9FD", border: `1.5px solid ${isChallenge ? C.solo : isSolo ? "#E8D5B7" : "#C8D8E8"}`, borderRadius: 12, marginBottom: 8, overflow: "hidden" }}>
      <div onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px", minHeight: 56, cursor: "pointer" }}>
        <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", padding: "3px 8px", borderRadius: 5, color: "#fff", flexShrink: 0, background: isSolo ? C.solo : C.blue }}>{isSolo ? "Jenna" : "All 3"}</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: C.ink, flex: 1, lineHeight: 1.3 }}>{ex.n}</span>
        {quick && <span style={{ fontSize: 12, color: C.muted, flexShrink: 0, marginLeft: 4 }}>{quick}</span>}
        <span style={{ color: C.faint, fontSize: 14, transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "none" }}>▾</span>
      </div>
      {open && (
        <div style={{ borderTop: `1px solid ${C.border}` }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, padding: "12px 12px 0" }}>
            {diag.pos && <div style={{ background: C.surface, borderRadius: 8, padding: 8, textAlign: "center" }}><div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: C.muted, marginBottom: 4 }}>Position</div>{diag.pos}</div>}
            {diag.cue && <div style={{ background: C.surface, borderRadius: 8, padding: 8, textAlign: "center" }}><div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: C.muted, marginBottom: 4 }}>Hand Cue</div>{diag.cue}</div>}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, padding: "10px 12px 0" }}>
            {ex.sets && <Chip label="Sets" val={ex.sets} />}
            {ex.reps && <Chip label="Reps" val={ex.reps} />}
            {ex.hold && <Chip label="Hold" val={ex.hold} />}
            {ex.dur && <Chip label="Duration" val={ex.dur} />}
            {ex.eq && <Chip label="Equipment" val={ex.eq} />}
          </div>
          <div style={{ padding: "10px 12px 0" }}>
            <div style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.08em", color: C.muted, marginBottom: 4 }}>Cue</div>
            <div style={{ fontSize: 13, lineHeight: 1.6, color: "#333" }}>{ex.c}</div>
          </div>
          <div style={{ margin: "10px 12px 0", background: "#EFF6FF", borderLeft: `3px solid ${C.blue}`, borderRadius: "0 8px 8px 0", padding: "8px 10px" }}>
            <div style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.08em", color: C.blue, marginBottom: 3 }}>DMI Rationale</div>
            <div style={{ fontSize: 12, lineHeight: 1.5, color: "#1e3a5f" }}>{ex.d}</div>
          </div>
          <div style={{ margin: "10px 12px 0" }}>
            <div onClick={(e) => { e.stopPropagation(); setPwOpen(o => !o); }} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.pwL, border: `1.5px solid ${C.pw}`, borderRadius: pwOpen ? "8px 8px 0 0" : 8, padding: "8px 10px", cursor: "pointer" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 14 }}>🔔</span>
                <span style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.07em", color: C.pw }}>Progress When</span>
              </div>
              <span style={{ color: C.pw, fontSize: 13, transition: "transform 0.2s", transform: pwOpen ? "rotate(180deg)" : "none" }}>▾</span>
            </div>
            {pwOpen && <div style={{ background: C.pwL, border: `1.5px solid ${C.pw}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: "8px 10px" }}><div style={{ fontSize: 12, lineHeight: 1.6, color: "#4C1D95" }}>{ex.pw}</div></div>}
          </div>
          <div style={{ padding: "10px 12px 12px" }}>
            <div style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.08em", color: C.muted, marginBottom: 4 }}>Session Note</div>
            <textarea value={note} onChange={e => handleNote(e.target.value)} placeholder="Log hold time, cue level, observations..." style={{ width: "100%", minHeight: 68, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", fontSize: 13, resize: "vertical", background: "#fff", color: C.ink, fontFamily: "inherit", boxSizing: "border-box" }} />
            {saved && <div style={{ fontSize: 11, color: C.green, marginTop: 3 }}>Saved ✓</div>}
          </div>
        </div>
      )}
    </div>
  );
}

function Chip({ label, val }) {
  return <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 8px" }}><span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 700 }}>{label}: </span><span style={{ fontSize: 12, color: C.ink, fontWeight: 500 }}>{val}</span></div>;
}

function Block({ title, sub, exes, color, dayKey, blockKey, notes, onSave }) {
  return (
    <div style={{ padding: "10px 16px 0" }}>
      <div style={{ background: color, padding: "8px 12px", borderRadius: 10, marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontWeight: 700, fontSize: 14, color: "#fff" }}>{title}</span>
        <span style={{ fontSize: 11, color: "rgba(255,255,255,0.85)" }}>{sub}</span>
      </div>
      {exes.map((ex, i) => {
        const key = `${dayKey}_${blockKey}_${ex.n.replace(/\s+/g, "_").substring(0, 25)}`;
        return <ExCard key={i} ex={ex} noteKey={key} savedNote={notes[key] || ""} onSave={onSave} />;
      })}
    </div>
  );
}

const DAY_COLORS = { consolidation: C.green, challenge: C.solo, benchmark: C.plum };
const DAY_BADGES = {
  consolidation: { bg: C.greenL, color: C.green, icon: "✓", text: "Consolidation — reinforce pattern at baseline" },
  challenge: { bg: "#FDF0E4", color: C.solo, icon: "⚡", text: "Challenge — hold duration ceiling push" },
  benchmark: { bg: C.plumL, color: C.plum, icon: "📊", text: "Benchmark — log data, compare to prior weeks" },
};

function App() {
  const rawDay = new Date().getDay();
  const todayIdx = rawDay === 0 ? 5 : Math.min(rawDay - 1, 5);
  const [dayIdx, setDayIdx] = useState(todayIdx);
  const [screen, setScreen] = useState("session");
  const [notes, setNotes] = useState({});

  useEffect(() => {
    async function load() {
      try {
        const raw = localStorage.getItem("dmi_notes_v3"); const n = raw ? { value: raw } : null;
        if (n) setNotes(JSON.parse(n.value));
      } catch (e) {}
    }
    load();
  }, []);

  const saveNote = useCallback(async (key, val) => {
    setNotes(prev => {
      const next = { ...prev, [key]: val };
      try { localStorage.setItem("dmi_notes_v3", JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, []);

  const day = DAYS[dayIdx];
  const typeColor = DAY_COLORS[day.type];
  const badge = DAY_BADGES[day.type];
  const isSat = day.type === "benchmark";
  const noteEntries = Object.entries(notes).filter(([, v]) => v.trim());

  return (
    <div style={{ fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background: C.surface, minHeight: "100vh", maxWidth: 500, margin: "0 auto", paddingBottom: 72 }}>

      {/* HEADER */}
      <div style={{ position: "sticky", top: 0, zIndex: 10, background: C.card, borderBottom: `1px solid ${C.border}`, padding: "14px 16px 10px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 17, fontWeight: 800, color: C.ink }}>Sullivan DMI</div>
            <div style={{ fontSize: 11, color: C.muted }}>Weekly Routine — Phase 1</div>
          </div>
          <span style={{ fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 20, background: badge.bg, color: badge.color }}>{day.focus}</span>
        </div>
        <div style={{ display: "flex", gap: 5 }}>
          {DAYS.map((d, i) => (
            <button key={d.key} onClick={() => setDayIdx(i)} style={{ flex: 1, padding: "8px 2px", borderRadius: 10, fontSize: 11, fontWeight: 700, cursor: "pointer", border: `2px solid ${dayIdx === i ? DAY_COLORS[d.type] : C.border}`, background: dayIdx === i ? DAY_COLORS[d.type] : C.card, color: dayIdx === i ? "#fff" : C.muted, transition: "all 0.15s", lineHeight: 1.2 }}>
              {d.label.substring(0, 3)}
            </button>
          ))}
        </div>
      </div>

      {screen === "session" && (
        <>
          <div style={{ margin: "10px 16px 0", padding: "7px 12px", borderRadius: 8, background: badge.bg, border: `1px solid ${badge.color}`, fontSize: 11, color: badge.color, fontWeight: 700 }}>
            {badge.icon} {badge.text}
          </div>
          <div style={{ margin: "8px 16px 0", background: C.amberL, border: `1.5px solid ${C.amber}`, borderRadius: 10, padding: "10px 12px", fontSize: 12, lineHeight: 1.5, color: "#78350F" }}>
            <strong>⚠ Safety:</strong> No catch reflex — spotter required on all standing. Flag fatigue before form breaks. E-stim first; read tone before proceeding.
          </div>
          {isSat ? (
            <Block title="Saturday Session" sub="60 min · All three + benchmarks" exes={day.sessions.all3} color={typeColor} dayKey={day.key} blockKey="all3" notes={notes} onSave={saveNote} />
          ) : (
            <>
              <Block title="Jenna Solo Block" sub="30 min" exes={day.sessions.solo} color={C.solo} dayKey={day.key} blockKey="solo" notes={notes} onSave={saveNote} />
              <Block title="All Three Block" sub="30 min" exes={day.sessions.all3} color={typeColor} dayKey={day.key} blockKey="all3" notes={notes} onSave={saveNote} />
            </>
          )}
          <div style={{ height: 20 }} />
        </>
      )}

      {screen === "notes" && (
        <div style={{ padding: "16px 16px 0" }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.ink, marginBottom: 4 }}>Session Log</div>
          <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>All saved notes — newest first.</div>
          {noteEntries.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px 20px", color: C.muted, fontSize: 14 }}>No session notes yet.<br />Notes saved during sessions appear here.</div>
          ) : [...noteEntries].reverse().map(([key, val]) => {
            const parts = key.split("_");
            const dayLabel = DAYS.find(d => d.key === parts[0])?.label || parts[0];
            const block = parts[1];
            const nm = parts.slice(2).join(" ").replace(/_/g, " ");
            return (
              <div key={key} style={{ background: C.card, borderRadius: 10, border: `1.5px solid ${C.border}`, marginBottom: 8, padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>{nm}</span>
                  <span style={{ fontSize: 11, color: C.muted }}>{dayLabel} · {block}</span>
                </div>
                <div style={{ fontSize: 13, color: "#444", lineHeight: 1.5 }}>{val}</div>
              </div>
            );
          })}
          <div style={{ height: 20 }} />
        </div>
      )}

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.card, borderTop: `1px solid ${C.border}`, display: "flex", zIndex: 100, maxWidth: 500, margin: "0 auto" }}>
        {[["session", "📋", "Routine"], ["notes", "📝", "Log"]].map(([id, icon, lbl]) => (
          <button key={id} onClick={() => setScreen(id)} style={{ flex: 1, padding: "10px 8px 8px", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, border: "none", background: "none", cursor: "pointer", color: screen === id ? C.blue : C.faint, fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>
            <span style={{ fontSize: 20, lineHeight: 1 }}>{icon}</span>{lbl}
          </button>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
